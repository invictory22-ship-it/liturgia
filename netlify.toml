# Налаштування Netlify для голосового служебника.
# Сайт публікується з кореня репозиторію (там index.html + liturgy-data.js).
# Збірка не потрібна — це готові статичні файли.

[build]
  publish = "."
  command = ""

# Не кешувати liturgy-data.js надовго — щоб правки тексту з'являлись одразу
# (на телефоні достатньо оновити сторінку, без хитрощів з кешем).
[[headers]]
  for = "/liturgy-data.js"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
