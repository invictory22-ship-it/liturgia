<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Служебник — прототип з голосовим слідкуванням</title>
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: #000;
    color: #ddd;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .topbar {
    background: #0d0d0d;
    border-bottom: 1px solid #1f1f1f;
    padding: 10px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    flex-shrink: 0;
  }
  .topbar h1 {
    margin: 0;
    font-size: 14px;
    font-weight: 500;
    color: #888;
    letter-spacing: 0.02em;
  }
  .topbar-buttons { display: flex; gap: 8px; }

  button {
    background: #1a1a1a;
    color: #ddd;
    border: 1px solid #2c2c2c;
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s, border-color 0.15s;
  }
  button:hover { background: #252525; border-color: #3a3a3a; }
  button.primary {
    background: #c4661a;
    border-color: #d97a2c;
    color: #fff;
    font-weight: 500;
    padding: 10px 22px;
    font-size: 14px;
  }
  button.primary:hover { background: #d97a2c; }
  button.primary.listening {
    background: #1a1a1a;
    border-color: #c4661a;
    color: #c4661a;
  }

  .settings {
    background: #080808;
    border-bottom: 1px solid #1f1f1f;
    padding: 14px 18px;
    display: none;
    flex-shrink: 0;
  }
  .settings.open { display: block; }
  .settings textarea {
    width: 100%;
    background: #111;
    color: #ddd;
    border: 1px solid #2c2c2c;
    border-radius: 6px;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 14px;
    min-height: 90px;
    resize: vertical;
    line-height: 1.5;
  }
  .settings-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 12px;
    flex-wrap: wrap;
    font-size: 13px;
    color: #888;
  }
  .settings-row label { color: #888; }
  .settings-row input[type=range] { width: 140px; }
  .settings-row select {
    background: #111;
    color: #ddd;
    border: 1px solid #2c2c2c;
    border-radius: 6px;
    padding: 6px 10px;
    font-family: inherit;
    font-size: 13px;
  }
  .settings-note {
    color: #555;
    font-size: 12px;
    margin-top: 10px;
    line-height: 1.5;
  }

  .script {
    flex: 1;
    padding: 50px 70px;
    font-size: 30px;
    line-height: 1.55;
    overflow-y: auto;
    scroll-behavior: smooth;
  }
  .word {
    color: #f0f0f0;
    transition: color 0.2s, background-color 0.2s;
    cursor: pointer;
    border-radius: 4px;
    padding: 1px 2px;
  }
  .word:hover { background: rgba(255,255,255,0.05); }
  .word.said { color: #4a4a4a; }
  .word.current {
    color: #ff9933;
    background: rgba(255, 153, 51, 0.12);
    text-decoration: underline;
    text-underline-offset: 5px;
    text-decoration-thickness: 2px;
  }
  .hint {
    color: #555;
    font-style: italic;
    font-size: 0.78em;
  }

  .footer {
    background: #0d0d0d;
    border-top: 1px solid #1f1f1f;
    padding: 10px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .footer-left, .footer-right { display: flex; align-items: center; gap: 12px; }
  .status {
    color: #888;
    font-size: 13px;
  }
  .status.listening { color: #ff9933; }
  .status.error { color: #d04040; }
  .heard {
    color: #555;
    font-size: 12px;
    font-style: italic;
    max-width: 280px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .legend {
    display: flex;
    gap: 12px;
    font-size: 11px;
    color: #555;
  }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  @media (max-width: 700px) {
    .script { padding: 24px 22px; font-size: 22px; }
    .topbar h1 { display: none; }
  }
</style>
</head>
<body>

<div class="topbar">
  <h1>Служебник · прототип v1</h1>
  <div class="topbar-buttons">
    <button onclick="toggleSettings()">Налаштування</button>
    <button onclick="reset()">↺ Спочатку</button>
  </div>
</div>

<div class="settings" id="settings">
  <textarea id="text" placeholder="Введіть або вставте текст служби..."></textarea>
  <div class="settings-row">
    <label>Вікно пошуку:</label>
    <input type="range" id="window" min="2" max="15" value="5">
    <span id="windowOut" style="color:#ddd;min-width:18px;">5</span>
    <span style="color:#555;">слів вперед (менше = менше стрибків)</span>
  </div>
  <div class="settings-row">
    <label>Мова розпізнавання:</label>
    <select id="lang">
      <option value="uk-UA" selected>Українська</option>
      <option value="ru-RU">Російська</option>
      <option value="en-US">English</option>
    </select>
  </div>
  <div class="settings-note">
    Підказка: текст у [квадратних дужках] показується але алгоритм його ігнорує — зручно для відповідей хору, ремарок тощо. Слова в ALL CAPS з двокрапкою ("ДИЯКОН:", "ХОР:") теж автоматично ігноруються.
  </div>
</div>

<div class="script" id="script"></div>

<div class="footer">
  <div class="footer-left">
    <button class="primary" id="btnStart" onclick="toggleListening()">▶ Почати</button>
    <span class="status" id="status">Готово</span>
  </div>
  <div class="footer-right">
    <div class="legend">
      <div class="legend-item"><span class="legend-dot" style="background:#4a4a4a"></span>прочитано</div>
      <div class="legend-item"><span class="legend-dot" style="background:#ff9933"></span>поточне</div>
      <div class="legend-item"><span class="legend-dot" style="background:#f0f0f0"></span>попереду</div>
    </div>
    <span class="heard" id="heard"></span>
  </div>
</div>

<script>
const defaultText = `ДИЯКОН: За мир усього світу, за добрий стан святих Божих Церков і за з'єднання всіх Господу помолимось.

[ХОР: Господи, помилуй.]

ДИЯКОН: За святий храм цей і за тих, що з вірою, благоговінням і страхом Божим входять до нього, Господу помолимось.

[ХОР: Господи, помилуй.]

ДИЯКОН: За богоспасаєме місто це, за всяке місто, країну і за вірних, що живуть у них, Господу помолимось.

[ХОР: Господи, помилуй.]`;

let recognition = null;
let isListening = false;
let currentIndex = 0;
let scriptWords = [];
let lookAheadWindow = 5;
let totalProcessedWords = 0;
let lastSessionStartTranscriptLength = 0;

function normalize(word) {
  return word.toLowerCase()
    .replace(/[\u2019\u2018'`]/g, "'")
    .replace(/[^\p{L}']/gu, '')
    .trim();
}

function parseScript(text) {
  const segments = [];
  let wordIndex = 0;
  const bracketParts = text.split(/(\[[^\]]*\])/);

  for (const part of bracketParts) {
    if (part.startsWith('[') && part.endsWith(']')) {
      segments.push({ type: 'hint', text: part });
      continue;
    }
    // Detect role labels (ALL-CAPS followed by colon)
    const roleSplit = part.split(/(\p{Lu}{2,}:)/gu);
    for (const chunk of roleSplit) {
      if (/^\p{Lu}{2,}:$/u.test(chunk)) {
        segments.push({ type: 'hint', text: chunk });
        continue;
      }
      const tokens = chunk.split(/(\s+)/);
      for (const tok of tokens) {
        if (!tok) continue;
        if (/^\s+$/.test(tok)) {
          segments.push({ type: 'space', text: tok });
        } else if (normalize(tok).length > 0) {
          segments.push({ type: 'word', text: tok, index: wordIndex });
          wordIndex++;
        } else {
          segments.push({ type: 'space', text: tok });
        }
      }
    }
  }
  return segments;
}

function renderScript(text) {
  const segments = parseScript(text);
  scriptWords = segments.filter(s => s.type === 'word').map(s => s.text);

  const container = document.getElementById('script');
  container.innerHTML = '';

  for (const seg of segments) {
    if (seg.type === 'word') {
      const span = document.createElement('span');
      span.textContent = seg.text;
      span.className = 'word';
      span.dataset.idx = seg.index;
      span.addEventListener('click', () => setPosition(seg.index));
      container.appendChild(span);
    } else if (seg.type === 'hint') {
      const span = document.createElement('span');
      span.textContent = seg.text;
      span.className = 'hint';
      container.appendChild(span);
    } else {
      container.appendChild(document.createTextNode(seg.text));
    }
  }
  updateHighlight();
}

function updateHighlight() {
  const spans = document.querySelectorAll('#script .word');
  spans.forEach((span) => {
    const idx = parseInt(span.dataset.idx);
    span.classList.remove('said', 'current');
    if (idx < currentIndex) span.classList.add('said');
    else if (idx === currentIndex) span.classList.add('current');
  });
  const cur = document.querySelector('#script .word.current');
  if (cur) cur.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function setPosition(idx) {
  currentIndex = idx;
  totalProcessedWords = 0;
  lastSessionStartTranscriptLength = 0;
  if (recognition && isListening) {
    // Restart recognition so transcript baseline resets
    recognition.stop();
  }
  updateHighlight();
}

function wordMatches(heard, expected) {
  if (!heard || !expected) return false;
  if (heard === expected) return true;
  // Match first 3 chars for word stem (handles inflection / minor mishearings)
  if (heard.length >= 3 && expected.length >= 3) {
    if (heard.substring(0, 3) === expected.substring(0, 3)) {
      // Additional check: similar length (within 3 chars) to avoid e.g. "за" matching "забути"
      const lenDiff = Math.abs(heard.length - expected.length);
      if (lenDiff <= 3) return true;
    }
  }
  // Short words must match exactly
  return false;
}

function advancePosition(heardWord) {
  const windowEnd = Math.min(currentIndex + lookAheadWindow, scriptWords.length);
  for (let i = currentIndex; i < windowEnd; i++) {
    const scriptWord = normalize(scriptWords[i]);
    if (wordMatches(heardWord, scriptWord)) {
      currentIndex = i + 1;
      return true;
    }
  }
  return false;
}

function processTranscript(transcript) {
  const words = transcript.trim().split(/\s+/).map(normalize).filter(Boolean);
  const newWords = words.slice(totalProcessedWords);
  for (const w of newWords) {
    advancePosition(w);
  }
  totalProcessedWords = words.length;
  updateHighlight();
}

function startListening() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    setStatus('Браузер не підтримує розпізнавання. Використовуйте Chrome або Edge.', 'error');
    return;
  }
  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = document.getElementById('lang').value;

  totalProcessedWords = 0;

  recognition.onresult = (e) => {
    let fullTranscript = '';
    for (let i = 0; i < e.results.length; i++) {
      fullTranscript += e.results[i][0].transcript + ' ';
    }
    processTranscript(fullTranscript);
    const last = e.results[e.results.length - 1];
    document.getElementById('heard').textContent = '"' + last[0].transcript.trim() + '"';
  };

  recognition.onerror = (e) => {
    if (e.error === 'no-speech' || e.error === 'aborted') return;
    setStatus('Помилка: ' + e.error, 'error');
  };

  recognition.onend = () => {
    if (isListening) {
      // Auto-restart for continuous operation; reset transcript baseline
      totalProcessedWords = 0;
      try { recognition.start(); } catch(_) {}
    }
  };

  try {
    recognition.start();
    isListening = true;
    document.getElementById('btnStart').textContent = '⏸ Зупинити';
    document.getElementById('btnStart').classList.add('listening');
    setStatus('Слухаю...', 'listening');
  } catch (err) {
    setStatus('Не вдалося запустити: ' + err.message, 'error');
  }
}

function stopListening() {
  isListening = false;
  if (recognition) {
    try { recognition.stop(); } catch(_) {}
  }
  document.getElementById('btnStart').textContent = '▶ Почати';
  document.getElementById('btnStart').classList.remove('listening');
  setStatus('Зупинено');
}

function toggleListening() {
  if (isListening) stopListening();
  else startListening();
}

function reset() {
  currentIndex = 0;
  totalProcessedWords = 0;
  updateHighlight();
  document.getElementById('heard').textContent = '';
}

function setStatus(msg, cls) {
  const s = document.getElementById('status');
  s.textContent = msg;
  s.className = 'status' + (cls ? ' ' + cls : '');
}

function toggleSettings() {
  document.getElementById('settings').classList.toggle('open');
}

// Init
document.getElementById('text').value = defaultText;
renderScript(defaultText);

document.getElementById('text').addEventListener('input', (e) => {
  renderScript(e.target.value);
  currentIndex = 0;
  totalProcessedWords = 0;
});

document.getElementById('window').addEventListener('input', (e) => {
  lookAheadWindow = parseInt(e.target.value);
  document.getElementById('windowOut').textContent = lookAheadWindow;
});
</script>

</body>
</html>
